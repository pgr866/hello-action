name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:24-alpine
    steps:
      - name: Install git and rsync 📚
        run: apk update && apk add git rsync
        
      - uses: actions/checkout@v4
      
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies 
        run: npm install
        
      - name: Build Antora project
        run: |
          mkdir -p supplemental-ui
          cp -R node_modules/@antora/lunr-extension/supplemental_ui/* supplemental-ui/
          npx antora local-antora-playbook.yml --fetch
          
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs 
          path: docs/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          branch: gh-pages
          folder: docs
          clean: true